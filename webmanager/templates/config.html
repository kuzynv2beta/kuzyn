{% extends "main.html" %}

{% block styles %}
<style>
.config-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-top: 1rem;
}
.config-grid-item {
    flex: 1 1 340px;
    max-width: 48%;
    min-width: 280px;
}
@media (max-width: 900px) {
    .config-grid-item {
        max-width: 100%;
    }
}
.config-grid-item .gold-panel {
    min-height: 240px;
    display: flex;
    flex-direction: column;
    padding: 1rem;
}
.config-card-title {
    margin-bottom: 0.75rem;
    font-size: 1.05rem;
    color: var(--gold-2);
}
.config-section-help {
    display: block;
    margin-bottom: 1rem;
    color: var(--muted);
}
.card-header.panel-decor {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
[data-type=toggle].btn,
button[data-type=toggle],
.btn[data-type=toggle] {
    display: inline-flex;
    width: auto;
    min-width: auto;
    max-width: 11rem;
    padding: .25rem .6rem;
    font-size: .9rem;
    line-height: 1.25;
    white-space: nowrap;
    justify-content: center;
}
</style>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card mb-4">
            <div class="card-header panel-decor">
                <span class="gold-underline">Ustawienia</span>
            </div>
            <div class="card-body">
                <div class="config-grid">
                    {% for section in config %}
                    <div class="config-grid-item">
                        <div class="gold-panel">
                            <h4 class="config-card-title">{{section}}</h4>
                            {% if section in helpfile %}
                                <span class="config-section-help">{{helpfile[section]}}</span>
                            {% endif %}

                            <div class="form-vertical">
                                {{ config[section]|safe }}
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
	function set_config(parameter, value) {
		$.getJSON("/app/config/set?parameter="+encodeURIComponent(parameter)+"&value="+encodeURIComponent(value), function(data){
			console.log("Set values", parameter, value);
		});
	}

	function set_toggle_value(target, value) {
		if(!value) {
			target.removeClass("btn-success");
			target.addClass("btn-danger");
			target.text("Wyłączony");
		} else {
			target.addClass("btn-success");
			target.removeClass("btn-danger");
			target.text("Włączony");
		}
	}

	function toggle_event(event) {
		var target = $(event.target);
		var name = target.attr("data-type-option");
		if(name == undefined) alert("Error setting target");
		var current_value = target.hasClass("btn-success");
		var next_value = !current_value;
		set_config(name, next_value);
		set_toggle_value(target, next_value);
	}

	function select_event(event) {
	  var target = $(event.target);
		var name = target.attr("data-type-option");
		if(name == undefined) alert("Error setting target");
		set_config(name, target.val());
	}

	function num_event(event) {
      var target = $(event.target);
      var name = target.attr("data-type-option");
      if(name == undefined) alert("Error setting target");
      set_config(name, parseInt(target.val()));
	}

	function text_event(event) {
      var target = $(event.target);
      var name = target.attr("data-type-option");
      if(name == undefined) alert("Error setting target");
      set_config(name, target.val());
	}

	function list_event(event) {
      var target = $(event.target);
      var name = target.attr("data-type-option");
      if(name == undefined) alert("Error setting target");
      var value = target.val() || "";
      var items = value.split(',').map(function(item) { return item.trim(); }).filter(function(item) { return item !== ""; });
      set_config(name, JSON.stringify(items));
	}

	function collectFarmAssistantRules() {
		var rules = [];
		var name = $('.farm-assistant-rules .add-farm-assistant-rule').attr('data-type-option') || 'farm_assistant_rules';
		$('.farm-assistant-rule-row').each(function() {
			var row = $(this);
			var button = row.find('[data-rule-field="button"]').val();
			var field = row.find('[data-rule-field="field"]').val();
			var op = row.find('[data-rule-field="op"]').val();
			var value = row.find('[data-rule-field="value"]').val();
			rules.push({
				button: button,
				field: field,
				op: op,
				value: value === '' ? '' : Number(value)
			});
		});
		return { name: name, value: JSON.stringify(rules) };
	}

	function markConfigDirty() {
		// No button to enable when auto-saving.
	}

	function addFarmAssistantRuleRow() {
		var container = $('.farm-assistant-rules');
		if (!container.length) {
			return;
		}
		var typeOption = container.find('.add-farm-assistant-rule').attr('data-type-option') || 'farm_assistant_rules';
		var index = container.find('.farm-assistant-rule-row').length;
		var row = $('<div class="form-row align-items-center farm-assistant-rule-row" data-rule-index="'+index+'">' +
			'<div class="col-sm-2 mb-2">' +
			'<select class="form-control farm-assistant-rule-input" data-type="farm-rule" data-type-option="'+typeOption+'" data-rule-index="'+index+'" data-rule-field="button">' +
			'<option value="A">A</option><option value="B">B</option><option value="C">C</option>' +
			'</select></div>' +
			'<div class="col-sm-3 mb-2">' +
			'<select class="form-control farm-assistant-rule-input" data-type="farm-rule" data-type-option="'+typeOption+'" data-rule-index="'+index+'" data-rule-field="field">' +
			'<option value="none">none</option><option value="wall">wall</option><option value="distance">distance</option><option value="last_attack">last_attack</option>' +
			'</select></div>' +
			'<div class="col-sm-3 mb-2">' +
			'<select class="form-control farm-assistant-rule-input" data-type="farm-rule" data-type-option="'+typeOption+'" data-rule-index="'+index+'" data-rule-field="op">' +
			'<option value="none">none</option><option value="<">mniejsza (&lt;)</option><option value=">">większa (&gt;)</option><option value="<=">mniejsza lub równa (<=)</option><option value=">=">większa lub równa (>=)</option><option value="==">równa (==)</option>' +
			'</select></div>' +
			'<div class="col-sm-2 mb-2">' +
			'<input type="number" class="form-control farm-assistant-rule-input" data-type="farm-rule" data-type-option="'+typeOption+'" data-rule-index="'+index+'" data-rule-field="value" value="" />' +
			'</div>' +
			'<div class="col-sm-2 mb-2">' +
			'<button type="button" class="btn btn-danger btn-sm remove-farm-assistant-rule" data-rule-index="'+index+'">Usuń</button>' +
			'</div>' +
			'</div>');
		container.find('.add-farm-assistant-rule').before(row);
		collectFarmAssistantRules();
		markConfigDirty();
	}

	function removeFarmAssistantRuleRow(button) {
		button.closest('.farm-assistant-rule-row').remove();
		collectFarmAssistantRules();
		markConfigDirty();
	}

	$( document ).ready(function() {
		$( "[data-type=toggle]" ).click(function(e) {
		  toggle_event(e);
		});

		$( "[data-type=select]" ).change(function(e) {
		  select_event(e);
		});

		$( "[data-type=number]" ).change(function(e) {
		  num_event(e);
		});

		$( "[data-type=text]" ).change(function(e) {
		  text_event(e);
		});

		$( "[data-type=list]" ).change(function(e) {
		  list_event(e);
		});

		$(document).on('change', '.farm-assistant-rule-input', function() {
			var collected = collectFarmAssistantRules();
			set_config(collected.name, collected.value);
		});

		$(document).on('click', '.add-farm-assistant-rule', function() {
			addFarmAssistantRuleRow();
			var collected = collectFarmAssistantRules();
			set_config(collected.name, collected.value);
		});

		$(document).on('click', '.remove-farm-assistant-rule', function() {
			removeFarmAssistantRuleRow($(this));
			var collected = collectFarmAssistantRules();
			set_config(collected.name, collected.value);
		});
	});
</script>

{% endblock %}
