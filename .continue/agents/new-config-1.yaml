# This is an example configuration file
# To learn more, see the full config.yaml reference: https://docs.continue.dev/reference

name: qwen2.5-coder:14b
version: 0.0.1
schema: v1

models:
  # Główny model do czatu, edycji i apply
  - name: qwen2.5-coder:14b
    provider: ollama
    model: qwen2.5-coder:14b
    apiBase: http://localhost:11434
    roles:
      - chat
      - edit
      - apply
      # - autocomplete   # odkomentuj tylko jeśli chcesz używać 14B do Tab (będzie wolniej)

  # Model do embeddings (@codebase, wyszukiwanie w kodzie)
  - name: Nomic Embed
    provider: ollama
    model: nomic-embed-text
    roles:
      - embed